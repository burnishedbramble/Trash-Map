<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waste Photos</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f0eb;
      --surface: #fff;
      --dark: #1a1a1a;
      --mid: #555;
      --muted: #999;
      --border: #ddd;
      --accent: #e84c1e;
      --accent2: #2563eb;
      --radius: 4px;
      --panel: 380px;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── NAV TABS ── */
    .nav-tabs {
      display: flex;
      gap: 0.25rem;
    }
    .nav-tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-tab:hover { color: #fff; }
    .nav-tab.active {
      color: #fff;
      border-color: #555;
      background: rgba(255,255,255,0.08);
    }

    /* ── GRID PAGE ── */
    #grid-page {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }
    #grid-page.visible { display: flex; }

    #grid-filterbar {
      height: 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    #grid-filterbar label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    #grid-folder-filter, #grid-type-filter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--dark);
      padding: 0.3rem 0.6rem;
      outline: none;
      cursor: pointer;
      max-width: 200px;
    }
    #grid-search {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--dark);
      padding: 0.3rem 0.6rem;
      outline: none;
      width: 160px;
    }
    #grid-search:focus { border-color: var(--accent2); }
    #grid-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── GRID BODY: folder sections + masonry ── */
    #grid-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      background: var(--bg);
    }
    #grid-body::-webkit-scrollbar { width: 6px; }
    #grid-body::-webkit-scrollbar-track { background: transparent; }
    #grid-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .folder-section { margin-bottom: 2.5rem; }
    .folder-heading {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .folder-heading h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dark);
    }
    .folder-heading .folder-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    /* CSS-columns masonry */
    .masonry-grid {
      columns: 5 180px;
      column-gap: 8px;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: #ddd;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .masonry-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
    }
    /* Fallback tile for non-image files (videos, etc.) */
    .masonry-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 120px;
      background: #e8e6e1;
      gap: 0.4rem;
    }
    .masonry-tile .tile-icon { font-size: 1.6rem; }
    .masonry-tile .tile-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--mid);
      text-align: center;
      padding: 0 0.5rem;
      word-break: break-word;
      max-height: 2.5em;
      overflow: hidden;
    }
    .masonry-item .item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.5rem;
    }
    .masonry-item:hover .item-overlay { background: rgba(0,0,0,0.35); }
    .item-overlay .item-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .masonry-item:hover .item-name { opacity: 1; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner {
      background: var(--surface);
      border-radius: 6px;
      width: min(900px, 95vw);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    #lightbox-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      flex-shrink: 0;
    }
    #lightbox-title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--dark);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #lightbox-folder {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
    }
    #lightbox-close {
      font-size: 1.1rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mid);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      line-height: 1;
    }
    #lightbox-close:hover { background: var(--bg); }
    #lightbox-preview {
      flex: 1;
      overflow: hidden;
      background: #111;
      min-height: 400px;
    }
    #lightbox-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #lightbox-footer {
      display: flex;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
    }
    #lightbox-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      flex: 1;
    }
    #lightbox-prev, #lightbox-next {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      color: var(--dark);
    }
    #lightbox-prev:hover, #lightbox-next:hover { background: #e5e3de; }
    #lightbox-prev:disabled, #lightbox-next:disabled { opacity: 0.3; cursor: default; }
    .lb-action-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      border: none;
      border-radius: var(--radius);
      padding: 0.35rem 0.75rem;
      cursor: pointer;
    }
    .lb-btn-primary { background: var(--accent2); color: #fff; }
    .lb-btn-copy { background: var(--bg); border: 1px solid var(--border); color: var(--dark); }
    .lb-btn-copy:hover { background: #e5e3de; }

    #topbar {
      height: 52px;
      background: var(--dark);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1.5rem;
      flex-shrink: 0;
      z-index: 100;
    }
    #topbar h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
    }
    #topbar-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: #888;
      white-space: nowrap;
    }
    .topbar-sep { flex: 1; }



    /* ── FILTER BAR ── */
    #filterbar {
      height: 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
      flex-shrink: 0;
      z-index: 50;
    }
    #filterbar label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    #folder-filter, #type-filter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--dark);
      padding: 0.3rem 0.6rem;
      outline: none;
      cursor: pointer;
      max-width: 200px;
    }
    #search-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--dark);
      padding: 0.3rem 0.6rem;
      outline: none;
      width: 160px;
    }
    #search-input:focus { border-color: var(--accent2); }
    #filter-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }
    #no-gps-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--mid);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #no-gps-toggle input { cursor: pointer; }

    /* ── MAIN LAYOUT ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* Leaflet cluster-style pin */
    .photo-pin {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border: 2px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .photo-pin.no-gps {
      background: #bbb;
      border-radius: 50%;
      transform: none;
    }
    .photo-pin.selected {
      background: var(--accent2);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.35);
    }
    .photo-pin-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--dark);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      border-radius: 8px;
      padding: 1px 4px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── SIDE PANEL ── */
    #panel {
      width: var(--panel);
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 2;
    }
    #panel-header {
      padding: 0.85rem 1rem 0.65rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #panel-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    #panel-subtitle {
      font-size: 0.8rem;
      color: var(--dark);
      font-weight: 500;
      margin-top: 0.2rem;
    }

    /* Image preview */
    #preview-wrap {
      flex-shrink: 0;
      width: 100%;
      height: 220px;
      background: #eee;
      position: relative;
      overflow: hidden;
    }
    #preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      flex-direction: column;
      gap: 0.5rem;
    }
    #preview-placeholder .icon { font-size: 2rem; }

    /* Metadata */
    #meta-block {
      padding: 0.85rem 1rem;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      align-items: baseline;
    }
    .meta-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      min-width: 62px;
      flex-shrink: 0;
    }
    .meta-val {
      font-size: 0.75rem;
      color: var(--dark);
      word-break: break-all;
      line-height: 1.4;
    }
    .meta-val a { color: var(--accent2); text-decoration: none; }
    .meta-val a:hover { text-decoration: underline; }
    .coord-pill {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      user-select: all;
    }
    .coord-pill:hover { background: #e5e3de; }

    #action-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .action-btn {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border: none;
      border-radius: var(--radius);
      padding: 0.5rem 0.5rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-copy { background: var(--bg); border: 1px solid var(--border); color: var(--dark); }
    .btn-copy:hover { background: #e5e3de; opacity: 1; }

    /* Nearby list */
    #nearby-header {
      padding: 0.65rem 1rem 0.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    #nearby-list {
      flex: 1;
      overflow-y: auto;
    }
    #nearby-list::-webkit-scrollbar { width: 4px; }
    #nearby-list::-webkit-scrollbar-track { background: transparent; }
    #nearby-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .nearby-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    .nearby-item:hover { background: var(--bg); }
    .nearby-item.active { background: #eef2ff; border-left: 3px solid var(--accent2); padding-left: calc(1rem - 3px); }
    .nearby-thumb {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .nearby-thumb iframe {
      width: 200%;
      height: 200%;
      transform: scale(0.5);
      transform-origin: top left;
      pointer-events: none;
      border: none;
    }
    .nearby-info { flex: 1; min-width: 0; }
    .nearby-name {
      font-size: 0.72rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--dark);
    }
    .nearby-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
    #empty-state .big { font-size: 2.5rem; margin-bottom: 0.75rem; }
    #empty-state p { font-size: 0.78rem; line-height: 1.6; }

    /* Copy toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🚮 Waste Photos</h1>
  <span id="topbar-meta">Loading...</span>
  <div class="topbar-sep"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-map" onclick="switchView('map')">Map</button>
    <button class="nav-tab" id="tab-grid" onclick="switchView('grid')">Grid</button>
  </div>
</div>

<div id="map-page" style="display:flex;flex:1;flex-direction:column;overflow:hidden;">
<div id="filterbar">
  <label>Folder</label>
  <select id="folder-filter" onchange="applyFilters()">
    <option value="">All folders</option>
  </select>
  <label>Type</label>
  <select id="type-filter" onchange="applyFilters()">
    <option value="">All types</option>
    <option value="image">Images</option>
    <option value="video">Videos</option>
  </select>
  <input type="text" id="search-input" placeholder="Search filename…" oninput="applyFilters()"/>
  <label id="no-gps-toggle">
    <input type="checkbox" id="show-no-gps" onchange="applyFilters()"/>
    Show no-GPS
  </label>
  <span id="filter-count"></span>
</div>

<div id="main">
  <div id="map"></div>
  <div id="panel">
    <div id="empty-state">
      <div class="big">🗺️</div>
      <p>CSV is pre-loaded.<br/>Click a pin on the map to preview.</p>
    </div>
  </div>
</div>
</div>

<!-- ── GRID PAGE ── -->
<div id="grid-page">
  <div id="grid-filterbar">
    <label>Folder</label>
    <select id="grid-folder-filter" onchange="renderGrid()">
      <option value="">All folders</option>
    </select>
    <label>Type</label>
    <select id="grid-type-filter" onchange="renderGrid()">
      <option value="">All types</option>
      <option value="image">Images</option>
      <option value="video">Videos</option>
    </select>
    <input type="text" id="grid-search" placeholder="Search filename…" oninput="renderGrid()"/>
    <span id="grid-count"></span>
  </div>
  <div id="grid-body"></div>
</div>

<!-- ── LIGHTBOX ── -->
<div id="lightbox" onclick="lbClickOutside(event)">
  <div id="lightbox-inner">
    <div id="lightbox-header">
      <span id="lightbox-title"></span>
      <span id="lightbox-folder"></span>
      <button id="lightbox-close" onclick="closeLightbox()">✕</button>
    </div>
    <div id="lightbox-preview">
      <iframe id="lightbox-iframe" allowfullscreen loading="lazy"></iframe>
    </div>
    <div id="lightbox-footer">
      <span id="lightbox-meta"></span>
      <button id="lightbox-prev" onclick="lbNav(-1)">← Prev</button>
      <button id="lightbox-next" onclick="lbNav(1)">Next →</button>
      <button class="lb-action-btn lb-btn-copy" onclick="lbCopyPath()">Copy Path</button>
      <button class="lb-action-btn lb-btn-primary" onclick="lbOpenDrive()">Open in Drive ↗</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────
let allImages = [];
let filteredImages = [];
let markers = [];
let selectedId = null;
let map = null;

// ── AUTO‑LOAD CSV FROM GOOGLE SHEETS ─────────────────────────────────
async function loadFromCSVUrl() {
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShdSxffVjqBHMF-__Cw-AmqLGenzJ9W2UlrAF1z4Ktoun0jMVheMkEh-HMWtmDkBr4Qq9_p97ota3P/pub?output=csv";

  showToast("Loading CSV from 'Image Database Testing...if this looks out of date, ask Parker to update!");

  try {
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);

    showToast("CSV downloaded, parsing…");
    const text = await resp.text();

    if (!text.trim()) throw new Error("Empty CSV");

    loadCSVFromText(text);
  } catch (err) {
    const msg = "CSV load failed: " + err.message;
    showToast(msg);
    console.error(msg, err);
  }
}

// ── CSV LOAD / PARSE (from text only) ─────────────────────────────────
function loadCSVFromText(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return;

  const headers = rows[0].map(h => h.toLowerCase().trim());
  const col = (names) => {
    for (const n of names) {
      const i = headers.findIndex(h => h.includes(n));
      if (i >= 0) return i;
    }
    return -1;
  };

  const cName     = col(['file name', 'name', 'title']);
  const cUrl      = col(['file url', 'url', 'link']);
  const cDate     = col(['date']);
  const cType     = col(['file type', 'type']);
  const cFolder   = col(['subfolder', 'folder', 'location']);
  const cPath     = col(['full path', 'path']);
  const cLat      = col(['latitude', 'lat']);
  const cLng      = col(['longitude', 'lng', 'lon']);

  allImages = rows.slice(1).map((r, i) => {
    const latRaw = cLat >= 0 ? r[cLat] : '';
    const lngRaw = cLng >= 0 ? r[cLng] : '';
    const lat = parseFloat(latRaw);
    const lng = parseFloat(lngRaw);
    const hasGps = !isNaN(lat) && !isNaN(lng) && latRaw !== 'none' && latRaw !== '';
    return {
      id: i,
      name:     cName   >= 0 ? r[cName]   : 'Untitled',
      url:      cUrl    >= 0 ? r[cUrl]     : '',
      date:     cDate   >= 0 ? r[cDate]    : '',
      type:     cType   >= 0 ? r[cType]    : '',
      folder:   cFolder >= 0 ? r[cFolder]  : '',
      path:     cPath   >= 0 ? r[cPath]    : '',
      lat: hasGps ? lat : null,
      lng: hasGps ? lng : null,
      hasGps,
    };
  }).filter(img => img.url);

  // Populate folder filter
  const folders = [...new Set(allImages.map(i => i.folder).filter(Boolean))].sort();
  const sel = document.getElementById('folder-filter');
  sel.innerHTML = '<option value="">All folders</option>';
  folders.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    sel.appendChild(o);
  });

  const gpsCount = allImages.filter(i => i.hasGps).length;
  document.getElementById('topbar-meta').textContent =
    `${allImages.length} files · ${gpsCount} with GPS`;

  applyFilters();
  syncGridFolderFilter();
}


// ── MAP INIT ─────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([40.72, -73.97], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);
}
initMap();
loadFromCSVUrl();  // this is the only place you manually call it



// ── FILTERS ───────────────────────────────────────────────────────────
function applyFilters() {
  const folder  = document.getElementById('folder-filter').value;
  const type    = document.getElementById('type-filter').value;
  const search  = document.getElementById('search-input').value.toLowerCase();
  const showNoGps = document.getElementById('show-no-gps').checked;

  filteredImages = allImages.filter(img => {
    if (folder && img.folder !== folder) return false;
    if (type && img.type !== type) return false;
    if (search && !img.name.toLowerCase().includes(search)) return false;
    if (!showNoGps && !img.hasGps) return false;
    return true;
  });

  const gpsCount = filteredImages.filter(i => i.hasGps).length;
  document.getElementById('filter-count').textContent =
    `${filteredImages.length} shown · ${gpsCount} on map`;

  renderMarkers();
}

// ── MARKERS ───────────────────────────────────────────────────────────
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // Group images at same/near coords to avoid pile-ups
  const withGps = filteredImages.filter(i => i.hasGps);

  // Cluster by rounded coords
  const clusters = {};
  withGps.forEach(img => {
    const key = `${img.lat.toFixed(4)},${img.lng.toFixed(4)}`;
    if (!clusters[key]) clusters[key] = { lat: img.lat, lng: img.lng, images: [] };
    clusters[key].images.push(img);
  });

  Object.values(clusters).forEach(cluster => {
    const isSelected = cluster.images.some(i => i.id === selectedId);
    const pinEl = document.createElement('div');
    pinEl.style.position = 'relative';
    pinEl.innerHTML = `<div class="photo-pin${isSelected ? ' selected' : ''}"></div>
      ${cluster.images.length > 1 ? `<div class="photo-pin-count">${cluster.images.length}</div>` : ''}`;

    const icon = L.divIcon({ html: pinEl.outerHTML, className: '', iconSize: [28, 28], iconAnchor: [14, 28] });
    const marker = L.marker([cluster.lat, cluster.lng], { icon })
      .addTo(map)
      .on('click', () => selectCluster(cluster));
    markers.push(marker);
  });

  // If nothing selected yet and we have data, show the empty state instructing to click
  if (selectedId === null) {
    showEmptyPanel();
  }
}

function showEmptyPanel() {
  document.getElementById('panel').innerHTML = `
    <div id="empty-state">
      <div class="big">📌</div>
      <p>Click any pin on the map<br/>to preview photos at that location.</p>
    </div>`;
}

// ── SELECT ────────────────────────────────────────────────────────────
function selectCluster(cluster) {
  selectImage(cluster.images[0], cluster.images);
}

function selectImage(img, clusterImages) {
  selectedId = img.id;

  // Re-render markers to update selected state
  renderMarkers();

  // Pan map
  map.setView([img.lat, img.lng], Math.max(map.getZoom(), 15), { animate: true });

  // Build panel
  const panel = document.getElementById('panel');
  const embedUrl = toEmbedUrl(img.url);
  const gpsText = img.hasGps ? `${img.lat}, ${img.lng}` : 'No GPS data';

  panel.innerHTML = `
    <div id="panel-header">
      <div id="panel-title">Selected Image</div>
      <div id="panel-subtitle">${esc(img.name)}</div>
    </div>
    <div id="preview-wrap">
      <iframe id="preview-iframe" src="${embedUrl}" allowfullscreen loading="lazy"></iframe>
    </div>
    <div id="meta-block">
      <div class="meta-row">
        <span class="meta-key">Folder</span>
        <span class="meta-val">${esc(img.folder) || '—'}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Path</span>
        <span class="meta-val">${esc(img.path) || '—'}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Date</span>
        <span class="meta-val">${esc(img.date) || '—'}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">GPS</span>
        <span class="meta-val">
          ${img.hasGps
            ? `<span class="coord-pill" onclick="copyText('${img.lat}, ${img.lng}')" title="Click to copy">${img.lat}, ${img.lng}</span>`
            : '<span style="color:var(--muted)">No GPS data</span>'}
        </span>
      </div>
    </div>
    <div id="action-bar">
      <button class="action-btn btn-primary" onclick="window.open('${img.url}', '_blank')">Open in Drive ↗</button>
      <button class="action-btn btn-copy" onclick="copyText('${esc(img.path || img.name)}')">Copy Path</button>
      <button class="action-btn btn-copy" onclick="copyText('${img.url}')">Copy URL</button>
    </div>
    ${clusterImages && clusterImages.length > 1 ? `
    <div id="nearby-header">At this location — ${clusterImages.length} photos</div>
    <div id="nearby-list">
      ${clusterImages.map(ci => `
        <div class="nearby-item${ci.id === img.id ? ' active' : ''}" onclick="selectImage(${JSON.stringify(ci).replace(/"/g, '&quot;')}, null)">
          <div class="nearby-thumb">
            <iframe src="${toEmbedUrl(ci.url)}" loading="lazy"></iframe>
          </div>
          <div class="nearby-info">
            <div class="nearby-name">${esc(ci.name)}</div>
            <div class="nearby-sub">${esc(ci.date) || ''}</div>
          </div>
        </div>`).join('')}
    </div>` : `
    <div id="nearby-header">Nearby images</div>
    <div id="nearby-list">
      ${getNearby(img).map(ni => `
        <div class="nearby-item" onclick="selectImageById(${ni.id})">
          <div class="nearby-thumb">
            <iframe src="${toEmbedUrl(ni.url)}" loading="lazy"></iframe>
          </div>
          <div class="nearby-info">
            <div class="nearby-name">${esc(ni.name)}</div>
            <div class="nearby-sub">${esc(ni.folder) || ''}</div>
          </div>
        </div>`).join('')}
    </div>`}
  `;
}

function selectImageById(id) {
  const img = allImages.find(i => i.id === id);
  if (img) selectImage(img, null);
}

// ── NEARBY ────────────────────────────────────────────────────────────
function getNearby(img, n = 8) {
  if (!img.hasGps) return [];
  return filteredImages
    .filter(i => i.id !== img.id && i.hasGps)
    .map(i => ({ ...i, dist: Math.hypot(i.lat - img.lat, i.lng - img.lng) }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, n);
}

// ── HELPERS ───────────────────────────────────────────────────────────
function toEmbedUrl(url) {
  if (!url) return '';
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  });
  showToast('Copied!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
  
// ── PARSE CSV ─────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  for (const line of lines) {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────
function switchView(view) {
  const mapPage = document.getElementById('map-page');
  const gridPage = document.getElementById('grid-page');
  const tabMap = document.getElementById('tab-map');
  const tabGrid = document.getElementById('tab-grid');

  if (view === 'map') {
    mapPage.style.display = 'flex';
    gridPage.classList.remove('visible');
    tabMap.classList.add('active');
    tabGrid.classList.remove('active');
    // Invalidate map size after show
    setTimeout(() => { if (map) map.invalidateSize(); }, 50);
  } else {
    mapPage.style.display = 'none';
    gridPage.classList.add('visible');
    tabMap.classList.remove('active');
    tabGrid.classList.add('active');
    // Sync folder options from map filters then render
    syncGridFolderFilter();
    renderGrid();
  }
}

function syncGridFolderFilter() {
  const src = document.getElementById('folder-filter');
  const dst = document.getElementById('grid-folder-filter');
  const current = dst.value;
  dst.innerHTML = src.innerHTML;
  // Restore selection if still valid
  if ([...dst.options].some(o => o.value === current)) dst.value = current;
}

// ── GRID RENDERING ────────────────────────────────────────────────────
let gridImages = [];      // current filtered set for lightbox nav
let lbIndex = -1;         // lightbox current index in gridImages

function renderGrid() {
  const folder = document.getElementById('grid-folder-filter').value;
  const type   = document.getElementById('grid-type-filter').value;
  const search = document.getElementById('grid-search').value.toLowerCase();

  gridImages = allImages.filter(img => {
    if (folder && img.folder !== folder) return false;
    if (type && img.type !== type) return false;
    if (search && !img.name.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('grid-count').textContent = `${gridImages.length} files`;

  const body = document.getElementById('grid-body');

  if (!gridImages.length) {
    body.innerHTML = `<div style="text-align:center;padding:4rem;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted)">No images found</div>`;
    return;
  }

  // Group by folder (or "No Folder")
  const groups = {};
  gridImages.forEach((img, idx) => {
    const key = img.folder || '(No Folder)';
    if (!groups[key]) groups[key] = [];
    groups[key].push({ img, idx }); // idx = index in gridImages for lightbox nav
  });

  // If a single folder is selected, skip the heading grouping
  const folderKeys = Object.keys(groups).sort();

  body.innerHTML = folderKeys.map(fk => {
    const items = groups[fk];
    const headingHtml = folderKeys.length > 1 || !folder
      ? `<div class="folder-heading">
           <h2>${esc(fk)}</h2>
           <span class="folder-count">${items.length} file${items.length !== 1 ? 's' : ''}</span>
         </div>`
      : '';

    const tilesHtml = items.map(({ img, idx }) => {
      const isImage = !img.type || img.type === 'image';
      const tileContent = isImage
        ? `<img src="${toThumbnailUrl(img.url)}" alt="${esc(img.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'masonry-tile\\'><div class=\\'tile-icon\\'>🖼️</div><div class=\\'tile-name\\'>${esc(img.name)}</div></div>'">`
        : `<div class="masonry-tile"><div class="tile-icon">🎥</div><div class="tile-name">${esc(img.name)}</div></div>`;

      return `<div class="masonry-item" onclick="openLightbox(${idx})" title="${esc(img.name)}">
        ${tileContent}
        <div class="item-overlay"><span class="item-name">${esc(img.name)}</span></div>
      </div>`;
    }).join('');

    return `<div class="folder-section">${headingHtml}<div class="masonry-grid">${tilesHtml}</div></div>`;
  }).join('');
}

function toThumbnailUrl(url) {
  if (!url) return '';
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  return url;
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────
function openLightbox(idx) {
  lbIndex = idx;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKeyHandler);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-iframe').src = '';
  document.removeEventListener('keydown', lbKeyHandler);
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lbKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
}

function lbNav(dir) {
  const newIdx = lbIndex + dir;
  if (newIdx >= 0 && newIdx < gridImages.length) {
    lbIndex = newIdx;
    renderLightbox();
  }
}

function renderLightbox() {
  const img = gridImages[lbIndex];
  if (!img) return;

  document.getElementById('lightbox-title').textContent = img.name;
  document.getElementById('lightbox-folder').textContent = img.folder || '';
  document.getElementById('lightbox-iframe').src = toEmbedUrl(img.url);
  document.getElementById('lightbox-meta').textContent =
    [img.date, img.hasGps ? `${img.lat}, ${img.lng}` : 'No GPS'].filter(Boolean).join(' · ');

  document.getElementById('lightbox-prev').disabled = lbIndex === 0;
  document.getElementById('lightbox-next').disabled = lbIndex === gridImages.length - 1;
}

function lbCopyPath() {
  const img = gridImages[lbIndex];
  if (img) copyText(img.path || img.name);
}
function lbOpenDrive() {
  const img = gridImages[lbIndex];
  if (img) window.open(img.url, '_blank');
}


</script>
